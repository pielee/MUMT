controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diffdrive_controller:
      type: diff_drive_controller/DiffDriveController


joint_state_broadcaster:
  ros__parameters:
    joints: ["front_left_wheel_joint", "front_right_wheel_joint", "rear_left_wheel_joint", "rear_right_wheel_joint"]

diffdrive_controller:
  ros__parameters:
    left_wheel_names: ["front_left_wheel_joint", "rear_left_wheel_joint"]
    right_wheel_names: ["front_right_wheel_joint", "rear_right_wheel_joint"]

    wheel_separation: 0.5708  # 0.2854 * 2 from Husky.proto
    wheel_radius: 0.1651      # from Husky.proto Cylinder radius

    # Adjust this multiplier if odometry is not accurate
    wheel_separation_multiplier: 1.0

    use_stamped_vel: true
    base_frame_id: "base_link"
    
    linear:
      x:
        has_velocity_limits: true
        max_velocity: 1.6  # Husky max speed (m/s)

    angular:
      z:
        has_velocity_limits: true
        max_velocity: 1.2 #2.0  # Husky max angular speed (rad/s)